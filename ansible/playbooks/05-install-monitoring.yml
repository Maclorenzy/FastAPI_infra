- name: Installer Prometheus + Grafana + Loki
  hosts: vm
  become: false
  environment:
    KUBECONFIG: /home/freebox/.kube/config

  vars:
    prometheus_chart_version: "62.7.0"
    loki_chart_version: "6.18.0"

  tasks:
    - name: Créer le namespace monitoring
      command: kubectl create namespace monitoring
      ignore_errors: true

    - name: Installer kube-prometheus-stack
      command: >
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack
        --namespace monitoring
        --version {{ prometheus_chart_version }}
        --values /home/freebox/FastAPI_infra/helm/monitoring/prometheus-values.yaml
        --wait
        --timeout 15m

    - name: Installer Loki Stack (logs centralisés)
      command: >
        helm upgrade --install loki grafana/loki-stack
        --namespace monitoring
        --version {{ loki_chart_version }}
        --set promtail.enabled=true
        --set loki.persistence.enabled=false
        --set loki.resources.requests.cpu=50m
        --set loki.resources.requests.memory=128Mi
        --wait
        --timeout 10m

    - name: Vérifier le statut du monitoring
      command: kubectl get pods -n monitoring
      register: monitoring_pods

    - debug:
        msg: "{{ monitoring_pods.stdout }}"

    - name: Récupérer le mot de passe Grafana
      shell: >
        kubectl get secret --namespace monitoring prometheus-grafana
        -o jsonpath="{.data.admin-password}" | base64 -d
      register: grafana_password

    - debug:
        msg: "🎨 Grafana admin password : {{ grafana_password.stdout }}"
