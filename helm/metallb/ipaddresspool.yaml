# Pool d'IPs que MetalLB peut assigner aux Services LoadBalancer
# Ici : une seule IP, celle de notre VM
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: vm-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.37/32              # /32 = exactement cette IP, rien d'autre
  autoAssign: true
---
# L2Advertisement : annonce l'IP sur le réseau local (ARP)
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: vm-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - vm-pool
  interfaces:
    - eth0                          # ← Adapter à votre interface réseau
